<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TimesPro · Brand Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1C2A6B; --navy-2:#27348a; --navy-3:#2c3d9e;
    --red:#E5331F; --red-2:#c8281a;
    --ink:#1c2030; --muted:#737a8c; --faint:#9aa1b3;
    --line:#e4e7f0; --line-2:#eef1f8;
    --bg:#eceff5; --card:#ffffff; --soft:#f6f8fd; --soft-2:#f0f3fb;
    --shadow:0 1px 2px rgba(20,28,64,.06),0 8px 24px rgba(20,28,64,.08);
    --shadow-sm:0 1px 2px rgba(20,28,64,.08);
    --col:262px; --r:10px;
    --font:'Montserrat','Segoe UI','Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden;}
  button{font-family:inherit;cursor:pointer;}
  ::-webkit-scrollbar{height:11px;width:11px;}
  ::-webkit-scrollbar-thumb{background:#c3cadd;border-radius:8px;border:3px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:#a7b0cb;background-clip:padding-box;border:3px solid transparent;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ===== Top brand bar ===== */
  .topbar{height:74px;background:var(--card);display:flex;align-items:center;gap:20px;padding:0 22px;
    border-bottom:3px solid var(--red);box-shadow:var(--shadow-sm);position:relative;z-index:30;}
  .logos{display:flex;align-items:center;gap:18px;}
  .logos .logo-tp{height:34px;width:auto;display:block;}
  .logos .logo-tg{height:44px;width:auto;display:block;opacity:.97;}
  .logo-sep{width:1px;height:42px;background:var(--line);display:block;}
  .titlewrap{display:flex;flex-direction:column;line-height:1.15;padding-left:20px;border-left:1px solid var(--line);}
  .titlewrap .t1{font-weight:800;font-size:18px;letter-spacing:-.2px;color:var(--navy);}
  .titlewrap .t2{font-weight:500;font-size:11.5px;color:var(--muted);letter-spacing:.2px;text-transform:uppercase;margin-top:2px;}
  .titlewrap .t2 b{color:var(--red);font-weight:700;}

  /* ===== Toolbar ===== */
  .toolbar{height:46px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:0 14px;position:relative;z-index:20;box-shadow:0 1px 0 rgba(20,28,64,.03);}
  .tgrp{display:flex;align-items:center;gap:6px;}
  .tdiv{width:1px;height:22px;background:var(--line);margin:0 6px;}
  .btn{height:32px;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:0 12px;font-size:12px;font-weight:600;color:var(--ink);display:inline-flex;align-items:center;gap:7px;transition:.15s;}
  .btn:hover{background:var(--soft);border-color:#d2d8ea;}
  .btn.primary{background:var(--navy);color:#fff;border-color:var(--navy);}
  .btn.primary:hover{background:var(--navy-2);}
  .btn.icon{width:32px;padding:0;justify-content:center;font-size:15px;}
  .btn.sm{height:28px;padding:0 9px;font-size:11.5px;}
  .toolbar .right{margin-left:auto;display:flex;gap:8px;align-items:center;}
  .zoom{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);font-weight:600;}
  .zoom input{width:108px;accent-color:var(--navy);}
  .toggle{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--ink);user-select:none;cursor:pointer;padding:5px 8px;border-radius:7px;}
  .toggle:hover{background:var(--soft);}
  .toggle input{accent-color:var(--navy);width:15px;height:15px;}

  /* ===== App body ===== */
  .app{display:flex;height:calc(100vh - 74px - 46px);}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .legend{display:flex;flex-wrap:wrap;gap:5px 16px;padding:9px 16px;background:var(--card);border-bottom:1px solid var(--line);align-items:center;}
  .legend .hint{font-size:11px;color:var(--faint);font-weight:600;margin-left:auto;}
  .lg{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--muted);}
  .lg i{width:11px;height:11px;border-radius:3px;display:inline-block;}

  /* ===== Gantt scroll ===== */
  .scroll{flex:1;overflow:auto;position:relative;background:var(--card);}
  .gantt{position:relative;min-width:max-content;}
  .head{position:sticky;top:0;z-index:14;display:flex;background:var(--card);box-shadow:0 1px 0 var(--line);}
  .corner{position:sticky;left:0;z-index:16;width:var(--col);min-width:var(--col);background:var(--card);border-right:1px solid var(--line);
    display:flex;flex-direction:column;justify-content:flex-end;padding:0 14px 6px;border-bottom:1px solid var(--line);}
  .corner .c1{font-size:10px;font-weight:800;letter-spacing:.8px;color:var(--navy);text-transform:uppercase;}
  .corner .c2{font-size:10px;color:var(--faint);font-weight:600;margin-top:1px;}
  .timehead{position:relative;border-bottom:1px solid var(--line);height:54px;}
  .mon{position:absolute;top:0;height:30px;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;
    color:var(--navy);letter-spacing:.3px;border-left:1px solid var(--line);}
  .mon.alt{background:var(--soft);}
  .wk{position:absolute;height:24px;top:30px;border-left:1px solid var(--line-2);font-size:9.5px;color:var(--faint);font-weight:600;
    padding-left:4px;display:flex;align-items:center;white-space:nowrap;overflow:hidden;}
  .wk.mstart{border-left:1px solid var(--line);}

  .body{position:relative;}
  .overlay{position:absolute;top:0;bottom:0;pointer-events:none;z-index:2;}
  .gl{position:absolute;top:0;bottom:0;width:1px;background:var(--line-2);}
  .gl.m{background:var(--line);}
  .wknd{position:absolute;top:0;bottom:0;background:rgba(28,42,107,.035);}
  .today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:6;}
  .today .flag{position:absolute;top:2px;left:0;transform:translateX(-50%);background:var(--red);color:#fff;font-size:9px;font-weight:800;
    padding:2px 7px;border-radius:6px;white-space:nowrap;letter-spacing:.4px;}

  .row{display:flex;position:relative;border-bottom:1px solid var(--line-2);}
  .row:hover .rowhead{background:var(--soft);}
  .row.sel .rowhead{background:#eef2ff;box-shadow:inset 3px 0 0 var(--navy);}
  .rowhead{position:sticky;left:0;z-index:8;width:var(--col);min-width:var(--col);background:var(--card);border-right:1px solid var(--line);
    display:flex;align-items:center;gap:9px;padding:0 12px;transition:background .12s;}
  .dot{width:14px;height:14px;border-radius:4px;flex:none;box-shadow:0 0 0 3px rgba(0,0,0,.04);cursor:pointer;transition:.12s;position:relative;}
  .dot:hover{transform:scale(1.12);box-shadow:0 0 0 4px rgba(0,0,0,.07);}
  .dot.col{border-radius:50%;}
  .rhtext{min-width:0;flex:1;cursor:pointer;}
  .rhtext .n{font-weight:700;font-size:12.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px;display:flex;align-items:center;gap:5px;}
  .rhtext .n .cv{color:var(--faint);font-size:9px;flex:none;}
  .rhtext .s{font-size:10px;color:var(--faint);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px;}
  .own{display:inline-flex;align-items:center;gap:4px;font-weight:700;color:var(--muted);}
  .oin{width:15px;height:15px;border-radius:50%;color:#fff;font-size:8px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:none;}
  .eye{flex:none;width:26px;height:26px;border-radius:7px;border:none;background:transparent;color:var(--faint);font-size:14px;display:flex;align-items:center;justify-content:center;}
  .eye:hover{background:var(--soft-2);color:var(--navy);}
  .row.off .rhtext{opacity:.4;}

  .rowbody{position:relative;}
  .envelope{position:absolute;top:8px;bottom:8px;border-radius:9px;border:1px dashed transparent;cursor:grab;z-index:1;transition:box-shadow .15s;}
  .envelope:hover{box-shadow:inset 0 0 0 1px rgba(28,42,107,.18);}
  .envelope:active{cursor:grabbing;}

  .stage{position:absolute;height:24px;border-radius:7px;display:flex;align-items:center;padding:0 9px;color:#fff;font-size:11px;font-weight:600;
    white-space:nowrap;overflow:hidden;cursor:grab;z-index:3;box-shadow:0 1px 2px rgba(20,28,64,.18);transition:filter .12s,box-shadow .12s;text-shadow:0 1px 1px rgba(0,0,0,.18);}
  .stage:hover{filter:brightness(1.07);box-shadow:0 2px 8px rgba(20,28,64,.26);z-index:7;}
  .stage:active{cursor:grabbing;}
  .stage .lbl{overflow:hidden;text-overflow:ellipsis;pointer-events:none;}
  .stage .lbl .dt{opacity:.82;font-weight:600;margin-left:7px;font-size:9.5px;}
  .stage.soft{border:1px dashed rgba(255,255,255,.9);background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.16) 0 6px,transparent 6px 12px);}
  .rz{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:6;}
  .rz.l{left:-1px;border-radius:7px 0 0 7px;} .rz.r{right:-1px;border-radius:0 7px 7px 0;}
  .rz:hover{background:rgba(255,255,255,.4);}

  .ms{position:absolute;z-index:4;cursor:grab;display:flex;align-items:center;justify-content:center;width:16px;height:24px;}
  .ms .dia{width:14px;height:14px;transform:rotate(45deg);border-radius:3px;flex:none;box-shadow:0 1px 2px rgba(20,28,64,.25);border:1.5px solid #fff;}
  .ms.soft .dia{opacity:.78;border-style:dashed;}
  .ms.echo{pointer-events:none;opacity:.5;}
  .ms.echo .dia{width:10px;height:10px;}
  .ms:active{cursor:grabbing;}
  .ms:hover .dia{transform:rotate(45deg) scale(1.14);}

  /* external label (for narrow bars + milestones) — keeps every name visible */
  .olbl{position:absolute;height:24px;display:flex;align-items:center;font-size:10.5px;font-weight:700;color:#2a2f45;
    background:rgba(255,255,255,.92);border:1px solid var(--line);padding:0 8px;border-radius:6px;white-space:nowrap;pointer-events:none;z-index:5;box-shadow:0 1px 2px rgba(20,28,64,.08);}
  .olbl .dt{color:var(--muted);font-weight:600;margin-left:7px;font-size:9.5px;}
  .olbl.soft{border-style:dashed;color:#8a4e41;}
  .olbl.soft .dt{color:#b07b6f;}

  /* ===== Side panel ===== */
  .panel{width:374px;min-width:374px;background:var(--card);border-left:1px solid var(--line);display:flex;flex-direction:column;box-shadow:-6px 0 24px rgba(20,28,64,.05);z-index:18;}
  .panel.closed{display:none;}
  .panel-h{height:46px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--line);gap:9px;}
  .panel-h .pt{font-size:12px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--navy);}
  .panel-h .pc{margin-left:auto;font-size:10px;color:var(--faint);font-weight:600;}
  .panel-b{flex:1;overflow-y:auto;padding:14px 16px 30px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:13px;}
  .card.accent{border-top:3px solid var(--navy);}
  .sec{font-size:10px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--faint);margin:0 0 10px;display:flex;align-items:center;gap:7px;}
  .sec .pill{margin-left:auto;font-size:9px;background:var(--soft-2);color:var(--muted);padding:2px 7px;border-radius:20px;letter-spacing:.3px;}
  label.fld{display:block;margin-bottom:10px;}
  label.fld:last-child{margin-bottom:0;}
  .fl{font-size:10.5px;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;letter-spacing:.2px;}
  input[type=text],input[type=date],input[type=number],textarea,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:12px;color:var(--ink);background:var(--card);transition:.15s;}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(28,42,107,.1);}
  textarea{resize:vertical;min-height:44px;line-height:1.4;}
  .row2{display:flex;gap:9px;} .row2>*{flex:1;min-width:0;}
  input[type=color]{width:38px;height:34px;padding:2px;border-radius:8px;border:1px solid var(--line);cursor:pointer;background:var(--card);}

  .alist{display:flex;flex-direction:column;gap:2px;}
  .arow{display:flex;align-items:center;gap:8px;padding:7px 6px 7px 8px;border-radius:9px;cursor:pointer;transition:.12s;border:1px solid transparent;}
  .arow:hover{background:var(--soft);}
  .arow.sel{background:#eef2ff;border-color:#d7defb;}
  .arow .sw{width:13px;height:13px;border-radius:4px;flex:none;}
  .arow .an{flex:1;min-width:0;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .arow.off .an{opacity:.4;}
  .arow .own2{font-size:9.5px;color:var(--muted);font-weight:700;background:var(--soft-2);padding:2px 6px;border-radius:10px;white-space:nowrap;flex:none;}
  .arow .cnt{font-size:9.5px;color:var(--faint);font-weight:700;flex:none;}
  .arow .ie{width:24px;height:24px;border:none;background:transparent;border-radius:6px;color:var(--faint);font-size:12px;display:flex;align-items:center;justify-content:center;flex:none;}
  .arow .ie:hover{background:#fff;color:var(--navy);}

  .stagebox{border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:9px;background:var(--soft);position:relative;}
  .stagebox .sh{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
  .stagebox .sh strong{font-size:11px;color:var(--muted);}
  .stagebox .sh .ord{display:flex;gap:2px;margin-left:auto;}
  .stagebox .sh button{width:23px;height:23px;border:1px solid var(--line);background:var(--card);border-radius:6px;font-size:11px;color:var(--muted);display:flex;align-items:center;justify-content:center;}
  .stagebox .sh button:hover{border-color:#cdd4e8;color:var(--navy);background:#fff;}
  .stagebox .sh button.del:hover{color:var(--red);border-color:#f3c4bd;}
  .chk{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;}
  .chk input{accent-color:var(--navy);}
  .addbtn{width:100%;border:1px dashed var(--line);background:var(--card);border-radius:8px;padding:8px;font-size:11.5px;font-weight:700;color:var(--navy);transition:.15s;}
  .addbtn:hover{border-color:var(--navy);background:var(--soft);}
  .panel-f{padding:10px 16px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;}
  .panel-f .saved{font-size:10px;color:var(--faint);font-weight:600;margin-left:auto;display:flex;align-items:center;gap:5px;}
  .dotlive{width:6px;height:6px;border-radius:50%;background:#22b06b;display:inline-block;}
  .empty{text-align:center;color:var(--faint);font-size:11.5px;padding:18px 8px;line-height:1.5;}
  .empty b{color:var(--muted);}

  /* versions */
  .vrow{display:flex;align-items:center;gap:7px;padding:8px;border:1px solid var(--line);border-radius:9px;background:var(--soft);margin-bottom:8px;}
  .vrow .vmain{flex:1;min-width:0;}
  .vrow input.vname{width:100%;border:1px solid transparent;background:transparent;font-weight:700;font-size:12px;color:var(--ink);padding:3px 5px;border-radius:6px;font-family:inherit;}
  .vrow input.vname:hover{border-color:var(--line);background:#fff;}
  .vrow input.vname:focus{border-color:var(--navy);background:#fff;outline:none;box-shadow:0 0 0 3px rgba(28,42,107,.1);}
  .vrow .vts{font-size:9.5px;color:var(--faint);font-weight:600;padding:1px 5px 0;}
  .vrow .vbtns{display:flex;gap:4px;flex:none;}
  .vrow .vb{height:26px;padding:0 9px;border:1px solid var(--line);background:#fff;border-radius:7px;font-size:10.5px;font-weight:700;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;}
  .vrow .vb:hover{border-color:#cdd4e8;}
  .vrow .vb.load{color:var(--navy);}
  .vrow .vb.load:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
  .vrow .vb.ic{width:26px;padding:0;color:var(--muted);font-size:13px;}
  .vrow .vb.ic:hover{color:var(--navy);}
  .vrow .vb.ic.del:hover{color:var(--red);border-color:#f3c4bd;}
  .vsave{width:100%;border:1px dashed var(--line);background:var(--card);border-radius:8px;padding:9px;font-size:11.5px;font-weight:700;color:var(--navy);}
  .vsave:hover{border-color:var(--navy);background:var(--soft);}
  .vsave:disabled{color:var(--faint);border-color:var(--line-2);background:var(--soft);cursor:not-allowed;}
  .vempty{font-size:11px;color:var(--faint);text-align:center;padding:4px 4px 10px;line-height:1.5;}

  /* tooltip */
  .tip{position:fixed;z-index:999;background:#161b2e;color:#fff;font-size:11px;border-radius:8px;padding:8px 11px;pointer-events:none;opacity:0;transition:opacity .1s;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:260px;}
  .tip b{font-weight:700;display:block;margin-bottom:3px;font-size:11.5px;}
  .tip .meta{color:#aeb6d6;font-weight:600;}
  .tip .sf{color:#ffb3a8;font-weight:700;margin-top:3px;}

  /* double-click stage popover */
  .pop{position:fixed;z-index:600;width:238px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 44px rgba(20,28,64,.24);padding:13px;display:none;}
  .pop .ph{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
  .pop .ph .pdot{width:11px;height:11px;border-radius:3px;}
  .pop .ph .ptt{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--navy);}
  .pop .ph .px{margin-left:auto;border:none;background:transparent;font-size:15px;color:var(--faint);line-height:1;}
  .pop .ph .px:hover{color:var(--red);}
  .pop .pf{display:flex;gap:8px;margin-top:6px;}

  @media print{
    body{overflow:visible;background:#fff;}
    .toolbar,.panel,.eye,.pop,.tip{display:none !important;}
    .app{height:auto;display:block;}
    .scroll{overflow:visible;height:auto;}
    .topbar{box-shadow:none;}
  }
  /* ---- shared-board (cloud) UI ---- */
  .cloud{font-size:12px;padding:2px 8px;border-radius:999px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
  .cloud.local{color:#888;}
  .cloud.live{color:#0a7d33;}
  .cloud.dirty{color:#b26a00;}
  .cloud.busy{color:#555;}
  .cloud.err{color:#c0392b;}
  #publishBtn:disabled{opacity:.5;cursor:not-allowed;}
  .cloud-toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(10px);background:#1d1d1f;color:#fff;
    padding:10px 16px;border-radius:10px;font-size:13px;box-shadow:0 6px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;z-index:9999;}
  .cloud-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .cloud-banner{position:fixed;left:50%;top:14px;transform:translateX(-50%);background:#fff7e6;border:1px solid #e0b252;
    color:#7a4d00;padding:10px 14px;border-radius:10px;font-size:13px;display:none;align-items:center;gap:10px;
    box-shadow:0 8px 28px rgba(0,0,0,.18);z-index:10000;}
  .cloud-banner.show{display:flex;}
</style>
</head>
<body>

/* ============================================================= *

 * ============================================================= */
const MS = 86400000;
const STORAGE_KEY = 'timespro_brand_calendar_v3';
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const PALETTE = ['#1C2A6B','#2E6FD6','#E5331F','#7A3FB8','#F2860D','#1F9D6B','#0E9AA7','#D99A00','#C2298A','#FF6B5B','#5B7A99','#B5853A'];

/* ---- date helpers (UTC) ---- */
const pd = s => { const [y,m,d] = s.split('-').map(Number); return Date.UTC(y, m-1, d); };
const ds = ms => { const d = new Date(ms); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); };
const addD = (ms,n) => ms + n*MS;

let state, ui;
function freshUI(){ return { selectedId:null, dayWidth:7, showToday:true, showWeekend:true, showLabels:true, panelOpen:true }; }
function normalize(st){
  st.activities.forEach(a=>{ if(a.owner==null) a.owner='Yash'; if(a.collapsed==null) a.collapsed=false; if(a.visible==null) a.visible=true;
    a.stages.forEach(s=>{ if(s.recurring===undefined) s.recurring=null; }); });
  return st;
}
function load(){
  try{ const raw = localStorage.getItem(STORAGE_KEY); if(raw){ const o = JSON.parse(raw); if(o && o.activities) return normalize(o); } }catch(e){}
  return null;
}
function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  if(!cloudApplyingRemote) cloudDirty = true;
  if(typeof updateCloudStatus==='function') updateCloudStatus();
  const el = document.getElementById('savedAt');
  const d = new Date();
  el.textContent = 'saved ' + String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
state = load() || buildDefaults();
ui = freshUI();

const VERSIONS_KEY = 'timespro_brand_calendar_versions_v1';

function loadVersions(){ try{ const r=localStorage.getItem(VERSIONS_KEY); if(r){ const a=JSON.parse(r); if(Array.isArray(a)) return a.slice(0,MAX_VERSIONS); } }catch(e){} return []; }
function saveVersions(){ try{ localStorage.setItem(VERSIONS_KEY, JSON.stringify(versions)); }catch(e){} }
function stamp(){ const d=new Date(); return d.getDate()+' '+MON[d.getMonth()]+', '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function snapVersion(){ if(versions.length>=MAX_VERSIONS) return; versions.push({ id:uid(), name:'Version '+(versions.length+1), savedAt:stamp(), data:clone(state) }); saveVersions(); renderPanel(); }
function updateVersion(id){ const v=versions.find(x=>x.id===id); if(!v) return; if(!confirm('Overwrite “'+v.name+'” with the current board?')) return; v.data=clone(state); v.savedAt=stamp(); saveVersions(); renderPanel(); }
function loadVersion(id){ const v=versions.find(x=>x.id===id); if(!v) return; if(!confirm('Load “'+v.name+'”? This replaces what is on the board now. (Your saved versions stay intact — save the current board first if you want to keep it.)')) return; state=normalize(clone(v.data)); ui.selectedId=null; closePopover(); save(); renderAll(); }
function deleteVersion(id){ const v=versions.find(x=>x.id===id); if(!v) return; if(!confirm('Delete version “'+v.name+'”?')) return; versions=versions.filter(x=>x.id!==id); saveVersions(); renderPanel(); }
function renameVersion(id,name){ const v=versions.find(x=>x.id===id); if(v){ v.name=name; saveVersions(); } }

/* ---- layout vars ---- */
let R0, R1, TOTAL, CW;
function recalc(){
  R0 = pd(state.meta.rangeStart); R1 = pd(state.meta.rangeEnd);
  TOTAL = Math.max(1, diffD(R0,R1)+1); CW = TOTAL*ui.dayWidth;
}
const xOf = msOrStr => { const ms = typeof msOrStr==='string'? pd(msOrStr): msOrStr; return diffD(R0, ms)*ui.dayWidth; };
const byId = id => state.activities.find(a=>a.id===id);
const clampStart = ms => Math.max(R0, Math.min(ms, R1));
const COLW = () => parseInt(getComputedStyle(document.documentElement).getPropertyValue('--col'));

/* ---- geometry ---- */
function actBounds(act){
  if(!act.stages.length){ const m=pd(state.meta.rangeStart); return [m, addD(m,7)]; }
  let mn=Infinity, mx=-Infinity;
  act.stages.forEach(s=>{ const a=pd(s.start); const b = s.type==='m'? addD(a,1) : addD(a, Math.max(1,s.days)); mn=Math.min(mn,a); mx=Math.max(mx,b); });
  return [mn,mx];
}
function stageDates(s){
  const a = pd(s.start);
  if(s.type==='m') return (s.soft?'~':'')+fmtS(a);
  const b = addD(a, Math.max(1,s.days));
  return (s.soft?'~':'')+fmtS(a)+' – '+fmtS(b-MS);
}
/* lane packing by VISUAL px extent (bar + external label) so every label stays visible */
function layout(act){
  const dw = ui.dayWidth;
  const arr = act.stages.map(s=>{
    const isM = s.type==='m';
    const left = xOf(s.start);
    const barW = isM ? 16 : Math.max(8, s.days*dw);
    const dt = stageDates(s);
    const lw = Math.ceil((s.name.length + dt.length + 3) * 6.0) + 22;
    const inside = !isM && barW >= lw + 14;
    const visL = isM ? left-8 : left;
    const visR = inside ? left+barW : (isM ? left+12+lw : left+barW+6+lw);
    return { s, isM, left, barW, dt, lw, inside, visL, visR };
  }).sort((a,b)=> a.visL-b.visL || a.visR-b.visR);
  const ends = [];
  arr.forEach(it=>{
    let lane=-1;
    for(let i=0;i<ends.length;i++){ if(ends[i] <= it.visL-6){ lane=i; break; } }
    if(lane<0){ lane=ends.length; ends.push(it.visR); } else { ends[lane]=it.visR; }
    it.lane=lane;
  });
  return { arr, lanes:Math.max(1, ends.length) };
}

/* ============================================================= *
 *  RENDER — Gantt                                                *
 * ============================================================= */
const gantt = document.getElementById('gantt');
const LANE_H = 30, ROW_PAD = 10;

function renderChart(){
  recalc();
  let html = '';

  /* header */
  html += '<div class="head"><div class="corner"><span class="c1">Tentpole Activity</span><span class="c2">'+state.activities.length+' tracks · click a dot to collapse</span></div>';
  html += '<div class="timehead" style="width:'+CW+'px">';
  let cur = Date.UTC(new Date(R0).getUTCFullYear(), new Date(R0).getUTCMonth(), 1);
  let alt=false;
  while(cur <= R1){
    const dd = new Date(cur);
    const next = Date.UTC(dd.getUTCFullYear(), dd.getUTCMonth()+1, 1);
    const left = Math.max(0, xOf(cur)), right = Math.min(CW, xOf(next)), w = right-left;
    if(w>2) html += '<div class="mon'+(alt?' alt':'')+'" style="left:'+left+'px;width:'+w+'px">'+MON[dd.getUTCMonth()]+' ’'+String(dd.getUTCFullYear()).slice(2)+'</div>';
    alt=!alt; cur=next;
  }
  const wd0 = new Date(R0).getUTCDay();
  const offMon = (1 - wd0 + 7) % 7;
  for(let d = offMon; d < TOTAL; d += 7){
    const dt = new Date(addD(R0,d)); const mStart = dt.getUTCDate() <= 7;
    html += '<div class="wk'+(mStart?' mstart':'')+'" style="left:'+(d*ui.dayWidth)+'px;width:'+(7*ui.dayWidth)+'px">'+dt.getUTCDate()+'</div>';
  }
  html += '</div></div>';

  /* body */
  html += '<div class="body">';
  const colW = COLW();
  html += '<div class="overlay" style="left:'+colW+'px;width:'+CW+'px">';
  if(ui.showWeekend){ const offSat=(6-wd0+7)%7; for(let d=offSat; d<TOTAL; d+=7){ html += '<div class="wknd" style="left:'+(d*ui.dayWidth)+'px;width:'+(2*ui.dayWidth)+'px"></div>'; } }
  for(let d=offMon; d<TOTAL; d+=7){ html += '<div class="gl" style="left:'+(d*ui.dayWidth)+'px"></div>'; }
  cur = Date.UTC(new Date(R0).getUTCFullYear(), new Date(R0).getUTCMonth(), 1);
  while(cur <= R1){ const left=xOf(cur); if(left>0&&left<CW) html += '<div class="gl m" style="left:'+left+'px"></div>'; cur = Date.UTC(new Date(cur).getUTCFullYear(), new Date(cur).getUTCMonth()+1, 1); }
  if(ui.showToday){ const n=new Date(); const t=Date.UTC(n.getFullYear(), n.getMonth(), n.getDate()); if(t>=R0&&t<=R1) html += '<div class="today" style="left:'+xOf(t)+'px"><span class="flag">TODAY</span></div>'; }
  html += '</div>';

  state.activities.forEach(act=>{
    const sel = act.id===ui.selectedId;
    const lay = act.collapsed ? {arr:[],lanes:1} : layout(act);
    const rowH = (act.collapsed?1:lay.lanes)*LANE_H + ROW_PAD*2;
    const [mn,mx] = actBounds(act);
    html += '<div class="row'+(sel?' sel':'')+(act.visible?'':' off')+'" style="height:'+rowH+'px">';
    // rowhead
    html += '<div class="rowhead">';
    html += '<span class="dot'+(act.collapsed?' col':'')+'" data-collapse="'+act.id+'" title="Click to collapse / expand this row" style="background:'+act.color+'"></span>';
    html += '<div class="rhtext" data-select="'+act.id+'"><div class="n"><span class="cv">'+(act.collapsed?'▸':'▾')+'</span>'+esc(act.name)+'</div>'
          + '<div class="s"><span class="own"><span class="oin" style="background:'+act.color+'">'+esc(act.owner.charAt(0).toUpperCase())+'</span>'+esc(act.owner)+'</span> · '+fmtS(mn)+' – '+fmtS(mx-MS)+'</div></div>';
    html += '<button class="eye" data-eye="'+act.id+'" title="Show / hide track">'+(act.visible?'◉':'○')+'</button>';
    html += '</div>';
    // rowbody
    html += '<div class="rowbody" style="width:'+CW+'px">';
    if(act.visible){
      const eL = xOf(mn), eW = Math.max(8, xOf(mx)-xOf(mn));
      html += '<div class="envelope" data-act="'+act.id+'" title="Drag to move the whole activity" style="left:'+eL+'px;width:'+eW+'px;background:'+hexA(act.color,.09)+';border-color:'+hexA(act.color,.32)+'"></div>';
      if(!act.collapsed){
        lay.arr.forEach(it=>{
          const s=it.s, top=ROW_PAD+it.lane*LANE_H;
          if(it.isM){
            if(s.recurring==='weekly'){ for(let ms=addD(pd(s.start),7); ms<=R1; ms=addD(ms,7)){ html += '<div class="ms echo" style="left:'+(xOf(ms)-5)+'px;top:'+(top+7)+'px"><span class="dia" style="background:'+act.color+'"></span></div>'; } }
            html += '<div class="ms'+(s.soft?' soft':'')+'" data-act="'+act.id+'" data-stage="'+s.id+'" title="Double-click to edit" style="left:'+(it.left-8)+'px;top:'+(top)+'px"><span class="dia" style="background:'+act.color+'"></span></div>';
            if(ui.showLabels) html += '<div class="olbl'+(s.soft?' soft':'')+'" style="left:'+(it.left+12)+'px;top:'+top+'px">'+esc(s.name)+(s.recurring==='weekly'?' ↻':'')+'<span class="dt">'+esc(it.dt)+'</span></div>';
          } else {
            html += '<div class="stage'+(s.soft?' soft':'')+'" data-act="'+act.id+'" data-stage="'+s.id+'" title="Double-click to edit" style="left:'+it.left+'px;top:'+top+'px;width:'+it.barW+'px;background:linear-gradient(180deg,'+lighten(act.color,12)+','+act.color+')">'
              + '<span class="rz l" data-side="l" data-act="'+act.id+'" data-stage="'+s.id+'"></span>'
              + (it.inside&&ui.showLabels? '<span class="lbl">'+esc(s.name)+'<span class="dt">'+esc(it.dt)+'</span></span>':'')
              + '<span class="rz r" data-side="r" data-act="'+act.id+'" data-stage="'+s.id+'"></span></div>';
            if(!it.inside&&ui.showLabels) html += '<div class="olbl'+(s.soft?' soft':'')+'" style="left:'+(it.left+it.barW+6)+'px;top:'+top+'px">'+esc(s.name)+'<span class="dt">'+esc(it.dt)+'</span></div>';
          }
        });
      }
    }
    html += '</div></div>';
  });
  html += '</div>';
  gantt.innerHTML = html;
}

      h += '<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">'
        + '<label class="fld" style="flex:1;margin-bottom:0"><span class="fl">Type</span><select data-sedit="type" data-stage="'+s.id+'"><option value="b"'+(s.type==='b'?' selected':'')+'>Bar (range)</option><option value="m"'+(s.type==='m'?' selected':'')+'>Milestone</option></select></label>'
        + '<label class="chk"><input type="checkbox" data-sedit="soft" data-stage="'+s.id+'"'+(s.soft?' checked':'')+'> Tentative</label>'
        + (s.type==='m'? '<label class="chk"><input type="checkbox" data-sedit="recurring" data-stage="'+s.id+'"'+(s.recurring==='weekly'?' checked':'')+'> Weekly</label>':'')
        + '</div></div>';
    });
    h += '<button class="addbtn" data-addstage="'+act.id+'">＋ Add stage</button>';
    h += '<div style="margin-top:12px;text-align:right"><button class="btn sm" data-delact="'+act.id+'" style="color:var(--red);border-color:#f3c4bd">Delete activity</button></div>';
    h += '</div>';
  } else {
    h += '<div class="card"><div class="empty"><b>Select an activity</b><br>Click any track to rename it, recolour it, set its owner, move the whole block, or edit stages.<br><br>Tip: <b>double-click</b> any bar on the chart to edit that stage right where it sits.</div></div>';
  }
  panelBody.innerHTML = h;
}

function renderAll(){ recalc(); renderChart(); renderLegend(); renderPanel(); syncToolbar(); if(popRef) positionPopover(); }

/* ---- small utils ---- */
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function shorten(s,n){ return s.length>n? s.slice(0,n-1)+'…': s; }
function toHex(c){ if(c[0]==='#') return c.length===4? '#'+[...c.slice(1)].map(x=>x+x).join(''):c; return c; }
function hexA(hex,a){ const h=toHex(hex); const n=parseInt(h.slice(1),16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }
function lighten(hex,p){ const h=toHex(hex); const n=parseInt(h.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.min(255,r+(255-r)*p/100|0); g=Math.min(255,g+(255-g)*p/100|0); b=Math.min(255,b+(255-b)*p/100|0); return 'rgb('+r+','+g+','+b+')'; }

/* ============================================================= *
 *  DRAG (move block / move stage / resize)                       *
 * ============================================================= */
const scroll = document.getElementById('scroll');
let drag = null, rafPending=false;
function scheduleChart(){ if(rafPending) return; rafPending=true; requestAnimationFrame(()=>{ rafPending=false; renderChart(); if(popRef) positionPopover(); }); }

scroll.addEventListener('pointerdown', e=>{
  const col = e.target.closest('[data-collapse]'); if(col){ const a=byId(col.dataset.collapse); a.collapsed=!a.collapsed; save(); renderAll(); return; }
  const eye = e.target.closest('[data-eye]'); if(eye){ const a=byId(eye.dataset.eye); a.visible=!a.visible; save(); renderAll(); return; }
  const rz = e.target.closest('.rz');
  const stEl = e.target.closest('.stage,.ms');
  const env = e.target.closest('.envelope');
  const head = e.target.closest('.rhtext');
  let info=null;
  if(rz) info={mode:'resize', side:rz.dataset.side, act:rz.dataset.act, stage:rz.dataset.stage};
  else if(stEl && stEl.dataset.stage) info={mode:'move-stage', act:stEl.dataset.act, stage:stEl.dataset.stage};
  else if(env) info={mode:'move-block', act:env.dataset.act};
  else if(head) info={mode:'select', act:head.dataset.select};
  if(!info) return;
  const act = byId(info.act);
  drag = { ...info, x0:e.clientX, y0:e.clientY, moved:false };
  if(info.mode==='move-block'){ drag.orig = act.stages.map(s=>pd(s.start)); }
  else if(info.stage){ const s=act.stages.find(x=>x.id===info.stage); drag.origStart=pd(s.start); drag.origDays=s.days; }
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  e.preventDefault();
});

function onMove(e){
  if(!drag) return;
  if(!drag.moved && (Math.abs(e.clientX-drag.x0)>4 || Math.abs(e.clientY-drag.y0)>4)){ drag.moved=true; if(popRef) closePopover(); }
  if(!drag.moved || drag.mode==='select') return;
  const dd = Math.round((e.clientX-drag.x0)/ui.dayWidth);
  const act = byId(drag.act);
  if(drag.mode==='move-block'){
    let minD=-1e9, maxD=1e9;
    act.stages.forEach((s,i)=>{ minD=Math.max(minD, R0-drag.orig[i]); });
    act.stages.forEach((s,i)=>{ const end = drag.orig[i] + (s.type==='m'?MS:Math.max(1,s.days)*MS); maxD=Math.min(maxD, R1-(end-MS)); });
    const dCl = Math.max(Math.round(minD/MS), Math.min(dd, Math.round(maxD/MS)));
    act.stages.forEach((s,i)=>{ s.start = ds(drag.orig[i] + dCl*MS); });
  } else {
    const s = act.stages.find(x=>x.id===drag.stage);
    if(drag.mode==='move-stage'){ s.start = ds(clampStart(drag.origStart + dd*MS)); }
    else if(drag.mode==='resize'){
      if(drag.side==='r'){ s.days = Math.max(1, drag.origDays + dd); }
      else { const nd=Math.max(1, drag.origDays - dd); s.start = ds(clampStart(drag.origStart + (drag.origDays-nd)*MS)); s.days=nd; }
    }
  }
  scheduleChart();
}
function onUp(){
  window.removeEventListener('pointermove', onMove);
  window.removeEventListener('pointerup', onUp);
  if(!drag) return;
  if(!drag.moved){ if(drag.act){ ui.selectedId=drag.act; renderAll(); } }
  else { save(); renderAll(); }
  drag=null;
}

const tip = document.getElementById('tip');
scroll.addEventListener('mousemove', e=>{
  if(drag && drag.moved){ tip.style.opacity=0; return; }
  const el = e.target.closest('.stage,.ms:not(.echo)');
  if(!el || !el.dataset.stage){ tip.style.opacity=0; return; }

  const a=pd(s.start);
  let body = '<b>'+esc(s.name)+'</b>';
  if(s.type==='m'){ body += '<span class="meta">'+fmtF(a)+(s.recurring==='weekly'?' · repeats weekly':' · milestone')+'</span>'; }
  else { const b=addD(a,Math.max(1,s.days)); body += '<span class="meta">'+fmtF(a)+' → '+fmtF(b-MS)+' · '+s.days+' day'+(s.days===1?'':'s')+'</span>'; }
  body += '<div style="color:'+lighten(act.color,30)+';font-weight:700;margin-top:3px;font-size:10px">'+esc(act.name)+' · '+esc(act.owner)+'</div>';
  if(s.soft) body += '<div class="sf">⚑ Tentative — confirm. Double-click to edit.</div>';

  let x=e.clientX+14, y=e.clientY+16;
  if(x+tip.offsetWidth>window.innerWidth-8) x=e.clientX-tip.offsetWidth-14;
  if(y+tip.offsetHeight>window.innerHeight-8) y=e.clientY-tip.offsetHeight-16;
  tip.style.left=x+'px'; tip.style.top=y+'px';
});
scroll.addEventListener('mouseleave', ()=> tip.style.opacity=0);

scroll.addEventListener('dblclick', e=>{

function closePopover(){ popRef=null; pop.style.display='none'; }
function buildPopover(){
  if(!popRef){ pop.style.display='none'; return; }

  if(!act || !s){ closePopover(); return; }

    + '<label class="fld" style="flex:0 0 86px"><span class="fl">Days</span><input type="number" min="1" data-pop="days" value="'+s.days+'"'+(s.type==='m'?' disabled':'')+'></label></div>'
    + '<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:4px">'
    + '<label class="fld" style="flex:1;margin:0"><span class="fl">Type</span><select data-pop="type"><option value="b"'+(s.type==='b'?' selected':'')+'>Bar</option><option value="m"'+(s.type==='m'?' selected':'')+'>Milestone</option></select></label>'
    + '<label class="chk"><input type="checkbox" data-pop="soft"'+(s.soft?' checked':'')+'> Tentative</label>'
    + (s.type==='m'? '<label class="chk"><input type="checkbox" data-pop="recurring"'+(s.recurring==='weekly'?' checked':'')+'> Weekly</label>':'')
    + '</div>'
    + '<div class="pf"><button class="btn sm" data-pop="del" style="color:var(--red);border-color:#f3c4bd">Delete</button><button class="btn primary sm" data-pop="close" style="margin-left:auto">Done</button></div>';
  pop.style.display='block';
  positionPopover();
}
function positionPopover(){
  if(!popRef) return;
  const el = gantt.querySelector('.stage[data-stage="'+popRef.stage+'"], .ms[data-stage="'+popRef.stage+'"]');
  if(!el){ return; }
  const r = el.getBoundingClientRect();
  const pw = pop.offsetWidth||238, phh = pop.offsetHeight||250;
  let x = r.right+10; if(x+pw > window.innerWidth-8) x = Math.max(8, r.left-pw-10);
  let y = r.top-8; if(y+phh > window.innerHeight-8) y = window.innerHeight-phh-8; if(y<64) y=64;
  pop.style.left=x+'px'; pop.style.top=y+'px';
}
pop.addEventListener('input', e=>{
  const t=e.target; if(!popRef||!t.dataset.pop) return;
  const act=byId(popRef.act); const s=act&&act.stages.find(x=>x.id===popRef.stage); if(!s) return;
  const k=t.dataset.pop;
  if(k==='name'){ s.name=t.value; save(); renderChart(); positionPopover(); refreshList(); }
  else if(k==='start'){ if(t.value){ s.start=t.value; save(); renderChart(); positionPopover(); } }
  else if(k==='days'){ s.days=Math.max(1,parseInt(t.value)||1); save(); renderChart(); positionPopover(); }
});
pop.addEventListener('change', e=>{
  const t=e.target; if(!popRef||!t.dataset.pop) return;
  const act=byId(popRef.act); const s=act&&act.stages.find(x=>x.id===popRef.stage); if(!s) return;
  const k=t.dataset.pop;
  if(k==='type'){ s.type=t.value; if(s.type==='b') s.recurring=null; save(); renderChart(); buildPopover(); if(ui.selectedId===act.id) renderPanel(); }
  else if(k==='soft'){ s.soft=t.checked; save(); renderChart(); positionPopover(); }
  else if(k==='recurring'){ s.recurring=t.checked?'weekly':null; save(); renderChart(); positionPopover(); }
});
pop.addEventListener('click', e=>{

  if(t.dataset.pop==='close'){ closePopover(); }

});
document.addEventListener('pointerdown', e=>{ if(popRef && !e.target.closest('#pop')) closePopover(); }, true);

function refreshList(){ document.querySelectorAll('.arow').forEach(r=>{ const a=byId(r.dataset.select); if(!a) return; const n=r.querySelector('.an'); if(n) n.textContent=a.name; const o=r.querySelector('.own2'); if(o) o.textContent=a.owner; }); }

panelBody.addEventListener('input', e=>{
  const t=e.target;
  if(t.dataset.vrename){ renameVersion(t.dataset.vrename, t.value); return; }
  if(t.dataset.meta){ state.meta[t.dataset.meta]=t.value; save(); renderAll(); return; }
  const act = byId(ui.selectedId);
  if(t.dataset.edit && act){
    const k=t.dataset.edit;
    if(k==='name'){ act.name=t.value; save(); renderChart(); refreshList(); }
    else if(k==='owner'){ act.owner=t.value; save(); renderChart(); refreshList(); }
    else if(k==='color'){ act.color=t.value; save(); renderChart(); }
    else if(k==='notes'){ act.notes=t.value; save(); }
    else if(k==='anchor'){ moveBlockTo(act, t.value); save(); renderChart(); }
    return;
  }
  if(t.dataset.sedit && act){
    const s=act.stages.find(x=>x.id===t.dataset.stage); if(!s) return;
    const k=t.dataset.sedit;
    if(k==='name'){ s.name=t.value; save(); renderChart(); }
    else if(k==='start'){ if(t.value){ s.start=t.value; save(); renderChart(); } }
    else if(k==='days'){ s.days=Math.max(1, parseInt(t.value)||1); save(); renderChart(); }
    return;
  }
});
panelBody.addEventListener('change', e=>{
  const t=e.target; const act=byId(ui.selectedId);
  if(t.dataset.edit==='color' && act){ save(); renderPanel(); }
  if(t.dataset.sedit && act){
    const s=act.stages.find(x=>x.id===t.dataset.stage); if(!s) return;
    const k=t.dataset.sedit;
    if(k==='type'){ s.type=t.value; if(s.type==='b' && s.recurring) s.recurring=null; save(); renderChart(); renderPanel(); }
    else if(k==='soft'){ s.soft=t.checked; save(); renderChart(); }
    else if(k==='recurring'){ s.recurring=t.checked?'weekly':null; save(); renderChart(); }
  }
});
panelBody.addEventListener('click', e=>{
  const t=e.target;
  if(t.closest('[data-vsave]')){ snapVersion(); return; }
  const vl=t.closest('[data-vload]'); if(vl){ loadVersion(vl.dataset.vload); return; }
  const vu=t.closest('[data-vupdate]'); if(vu){ updateVersion(vu.dataset.vupdate); return; }
  const vd=t.closest('[data-vdelete]'); if(vd){ deleteVersion(vd.dataset.vdelete); return; }
  const eye = t.closest('[data-eye]'); if(eye){ const a=byId(eye.dataset.eye); a.visible=!a.visible; save(); renderAll(); return; }
  const col = t.closest('[data-collapse]'); if(col){ const a=byId(col.dataset.collapse); a.collapsed=!a.collapsed; save(); renderAll(); return; }
  const ab = t.closest('[data-act-btn]'); if(ab){ doAction(ab.dataset.actBtn); return; }
  const sel = t.closest('[data-select]'); if(sel){ ui.selectedId=sel.dataset.select; renderAll(); return; }
  const act = byId(ui.selectedId);
  if(t.dataset.nudge && act){ act.stages.forEach(s=> s.start=ds(clampStart(pd(s.start)+parseInt(t.dataset.nudge)*MS))); save(); renderAll(); return; }
  if(t.dataset.addstage && act){ act.stages.push({id:uid(),name:'New stage',start:ds(actBounds(act)[1]),days:7,type:'b',soft:false,recurring:null}); save(); renderAll(); return; }
  if(t.dataset.stdel && act){ act.stages=act.stages.filter(s=>s.id!==t.dataset.stdel); save(); renderAll(); return; }
  if(t.dataset.stmove && act){ reorder(act.stages, t.closest('[data-stage]').dataset.stage, t.dataset.stmove); save(); renderAll(); return; }
  if(t.dataset.delact){ if(confirm('Delete this activity and all its stages?')){ state.activities=state.activities.filter(a=>a.id!==t.dataset.delact); ui.selectedId=null; save(); renderAll(); } return; }
});
function reorder(arr,id,dir){ const i=arr.findIndex(x=>x.id===id); if(i<0) return; const j=dir==='up'?i-1:i+1; if(j<0||j>=arr.length) return; const t=arr[i]; arr[i]=arr[j]; arr[j]=t; }
function moveBlockTo(act,newStartStr){ if(!newStartStr) return; const [mn]=actBounds(act); const delta=pd(newStartStr)-mn; act.stages.forEach(s=> s.start=ds(pd(s.start)+delta)); }

/* ============================================================= *

const importFile = document.getElementById('importFile');
function doAction(a){
  if(a==='export'){
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob); const link=document.createElement('a');
    link.href=url; link.download='TimesPro-Brand-Calendar.json'; link.click(); URL.revokeObjectURL(url);
  } else if(a==='import'){ importFile.click(); }
  else if(a==='print'){ window.print(); }
}
importFile.addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();

  rd.readAsText(f);
});

<!-- ===== Shared board: live sync logic ===== -->
<script>
(function(){
  const cfgOk = FIREBASE_CONFIG && FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.apiKey;
  const statusEl = document.getElementById('cloudStatus');
  const pubBtn   = document.getElementById('publishBtn');

  function setStatus(txt, cls){ if(statusEl){ statusEl.textContent = txt; statusEl.className = 'cloud ' + (cls||''); } }
  // exposed so save() can refresh the indicator on every edit
  window.updateCloudStatus = function(){
    if(!cfgOk){ setStatus('⚪ Local only', 'local'); return; }
    if(cloudDirty) setStatus('● Unpublished changes', 'dirty');
    else setStatus('🟢 Live · in sync', 'live');
  };

  // No backend configured yet: behave exactly like before (localStorage only).
  if(!cfgOk){
    updateCloudStatus();
    if(pubBtn){ pubBtn.disabled = true; pubBtn.title = 'Add your Firebase config near the top of this file to enable sharing'; }
    return;
  }

  // Display name shown to others on publish (no accounts — just a label).
  function editorName(){
    let n = localStorage.getItem('tp_editor_name');
    if(!n){ n = (prompt('Your name (shown to others when you publish):','') || '').trim() || 'Someone';
            localStorage.setItem('tp_editor_name', n); }
    return n;
  }

  function toast(msg){
    let t = document.getElementById('cloudToast');
    if(!t){ t = document.createElement('div'); t.id = 'cloudToast'; t.className = 'cloud-toast'; document.body.appendChild(t); }
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._h); t._h = setTimeout(()=> t.classList.remove('show'), 3000);
  }

  function showBanner(who, onLoad){
    let b = document.getElementById('cloudBanner');
    if(!b){ b = document.createElement('div'); b.id = 'cloudBanner'; b.className = 'cloud-banner'; document.body.appendChild(b); }
    b.innerHTML = '';
    const span = document.createElement('span');
    span.textContent = who + ' published a newer board — you have unpublished changes.';
    const load = document.createElement('button'); load.className = 'btn sm'; load.textContent = 'Load theirs';
    const keep = document.createElement('button'); keep.className = 'btn sm'; keep.textContent = 'Keep mine';
    load.onclick = ()=>{ onLoad(); b.classList.remove('show'); };
    keep.onclick = ()=>{ b.classList.remove('show'); };
    b.appendChild(span); b.appendChild(load); b.appendChild(keep);
    b.classList.add('show');
  }

  function applyRemote(v){
    cloudApplyingRemote = true;
    try{
      state = normalize(v.data);
      ui.selectedId = null;
      if(typeof closePopover === 'function') closePopover();
      cloudDirty = false;
      renderAll();
    } finally { cloudApplyingRemote = false; }
    updateCloudStatus();
  }

  let lastSeenTs = 0, myLastPublishTs = 0;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    const ref = firebase.database().ref(CLOUD_BOARD_PATH);
    setStatus('… Connecting', 'busy');

    ref.on('value', snap=>{
      const v = snap.val();
      if(!v || !v.data || !v.data.activities){ updateCloudStatus(); return; } // empty DB → keep local
      const ts = v.ts || 0;
      if(ts && ts === lastSeenTs) return;            // already applied
      if(ts && ts === myLastPublishTs){              // our own publish echoing back
        lastSeenTs = ts; cloudDirty = false; updateCloudStatus(); return;
      }
      lastSeenTs = ts;
      const who = v.by || 'Someone';
      if(cloudDirty){
        showBanner(who, ()=> applyRemote(v));        // don't clobber unpublished edits
      } else {
        applyRemote(v);
        toast('Updated to the latest board from ' + who);
      }
    }, err=>{ setStatus('⚠ Sync error', 'err'); console.error('RTDB error:', err); });

    pubBtn.addEventListener('click', ()=>{
      const by = editorName();
      const ts = Date.now();
      myLastPublishTs = ts;
      setStatus('… Publishing', 'busy');
      ref.set({ data: state, ts: ts, by: by })
        .then(()=>{ cloudDirty = false; lastSeenTs = ts; updateCloudStatus();
                    toast('Published — everyone on the link will see this'); })
        .catch(e=>{ setStatus('⚠ Publish failed', 'err'); alert('Publish failed: ' + e.message); });
    });
  }catch(e){
    setStatus('⚠ Cloud init failed', 'err');
    console.error('Firebase init failed:', e);
    if(pubBtn) pubBtn.disabled = true;
  }
})();
</script>
</body>
</html>
